<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>経過日数トラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f2f2f7;min-height:100vh;}
#app{max-width:430px;margin:0 auto;padding-bottom:100px;}
.topbar{background:#fff;border-bottom:1px solid #e5e5ea;padding:14px 16px 10px;position:sticky;top:0;z-index:10;}
.topbar h1{font-size:20px;font-weight:600;color:#000;}
.topbar .date{font-size:13px;color:#8e8e93;margin-top:2px;}
.badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.bdg{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600;}
.bdg-red{background:#ffe5e5;color:#c0392b;}
.bdg-orange{background:#fff3e0;color:#e65100;}
.sec{margin:16px 12px 0;}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sec-name{font-size:13px;font-weight:600;color:#6d6d72;text-transform:uppercase;letter-spacing:0.03em;}
.sec-btns{display:flex;gap:10px;}
.tbtn{font-size:13px;color:#007aff;background:none;border:none;cursor:pointer;padding:2px 0;}
.tbtn-gray{color:#8e8e93;}
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:rgba(0,0,0,0.05);}
.card:active{background:#f9f9f9;}
.bar{position:absolute;left:0;top:0;bottom:0;width:5px;}
.cc{padding-left:10px;}
.cname{font-size:16px;font-weight:600;color:#000;}
.cdays{font-size:36px;font-weight:700;line-height:1.1;margin:5px 0 3px;}
.clast{font-size:12px;color:#8e8e93;}
.calert{font-size:12px;margin-top:6px;padding:3px 12px;border-radius:10px;display:inline-block;font-weight:600;}
.g .bar{background:#34c759;} .g .cdays{color:#1a7a2e;}
.y .bar{background:#ff9500;} .y .cdays{color:#a05f00;}
.r .bar{background:#ff3b30;} .r .cdays{color:#9b1c16;}
.n .bar{background:#c7c7cc;} .n .cdays{color:#8e8e93;}
.noitem{font-size:13px;color:#c7c7cc;text-align:center;padding:12px 0;}
.fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;background:#007aff;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,122,255,0.4);z-index:50;-webkit-tap-highlight-color:transparent;}
.fab:active{background:#0062cc;}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:#f2f2f7;border-radius:16px 16px 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:0 0 40px;}
.shdl{width:36px;height:4px;background:#c7c7cc;border-radius:2px;margin:10px auto 0;}
.shtop{background:#fff;border-radius:16px 16px 0 0;padding:16px 20px 14px;margin-bottom:8px;}
.shtitle{font-size:18px;font-weight:600;color:#000;}
.shdays{font-size:52px;font-weight:700;text-align:center;margin:6px 0 2px;}
.shlast{font-size:14px;color:#8e8e93;text-align:center;margin-bottom:4px;}
.shsec{background:#fff;margin:0 0 8px;padding:14px 20px;}
.bp{display:block;width:100%;padding:15px;background:#007aff;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;}
.bp:active{background:#0062cc;}
.bs{display:block;width:100%;padding:14px;background:#fff;color:#007aff;border:1px solid #c7c7cc;border-radius:12px;font-size:16px;cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;}
.bs:active{background:#f2f2f7;}
.bd{display:block;width:100%;padding:14px;background:#fff;color:#ff3b30;border:1px solid #ffb3b0;border-radius:12px;font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.flabel{font-size:13px;color:#6d6d72;margin-bottom:5px;display:block;}
.finput{display:block;width:100%;padding:12px;font-size:16px;border:1px solid #c7c7cc;border-radius:10px;background:#fff;color:#000;-webkit-appearance:none;margin-bottom:4px;}
.finput:focus{outline:none;border-color:#007aff;}
.fnote{font-size:11px;color:#aeaeb2;}
.rowinput{display:flex;gap:8px;align-items:center;}
.rowinput .finput{flex:0 0 110px;margin:0;}
.rowinput .bs{width:auto;padding:10px 16px;margin:0;}
.htitle{font-size:13px;font-weight:600;color:#6d6d72;margin-bottom:8px;}
.hitem{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f2f2f7;font-size:14px;color:#000;}
.hitem:last-child{border:none;}
.hint{color:#8e8e93;font-size:13px;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1>経過日数トラッカー</h1>
    <div class="date" id="dlbl"></div>
    <div class="badges" id="bdgs"></div>
  </div>
  <div id="ct"></div>
</div>
<button class="fab" id="fadd">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
</button>
<div id="mroot"></div>

<script type="text/javascript">
var SK = 'etv3';

function ld() {
  try { var r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e) {}
  return { cats: [
    { id:'c1', name:'充電', items:[
      {id:'i1',name:'iPad',nd:null,h:[]},
      {id:'i2',name:'MacBook Air',nd:null,h:[]},
      {id:'i3',name:'時計',nd:null,h:[]}
    ]},
    { id:'c2', name:'詰め替え', items:[
      {id:'i4',name:'オールインワン',nd:null,h:[]},
      {id:'i5',name:'クレンジング',nd:null,h:[]},
      {id:'i6',name:'シャンプー',nd:null,h:[]}
    ]},
    { id:'c3', name:'交換', items:[
      {id:'i7',name:'喘息の薬',nd:28,h:[]}
    ]}
  ]};
}

function sv() { try { localStorage.setItem(SK, JSON.stringify(D)); } catch(e) {} }

var D = ld();

function uid() { return 'x' + Math.random().toString(36).slice(2,8); }

function td() {
  var d = new Date();
  return d.getFullYear() + '-' + p2(d.getMonth()+1) + '-' + p2(d.getDate());
}
function p2(n) { return ('0'+n).slice(-2); }
function fmt(s) { return s ? s.replace(/-/g,'/') : ''; }
function dif(a,b) { return Math.round((new Date(b) - new Date(a)) / 864e5); }

function el(it) {
  if (!it.h.length) return null;
  return dif(it.h[it.h.length-1], td());
}

function cc(it) {
  var d = el(it);
  if (d === null) return 'n';
  if (it.nd === null) { if (d < 7) return 'g'; if (d < 14) return 'y'; return 'r'; }
  var r = d / it.nd;
  if (r < 0.6) return 'g'; if (r < 0.85) return 'y'; return 'r';
}

function am(it) {
  var d = el(it);
  if (d === null || it.nd === null) return null;
  var rem = it.nd - d;
  if (rem <= 0) return '期限を過ぎています';
  if (rem <= Math.ceil(it.nd * 0.15)) return 'あと' + rem + '日で期限';
  if (rem <= Math.ceil(it.nd * 0.4)) return 'まもなく期限（' + rem + '日後）';
  return null;
}

function fc(id) { return D.cats.filter(function(c){ return c.id===id; })[0]; }
function fi(cid,iid) { return fc(cid).items.filter(function(i){ return i.id===iid; })[0]; }

function render() {
  document.getElementById('dlbl').textContent = fmt(td());
  var dn = 0, wn = 0;
  D.cats.forEach(function(cat) {
    cat.items.forEach(function(it) {
      var a = am(it); if (!a) return;
      if (a.indexOf('過ぎ') >= 0) dn++; else wn++;
    });
  });
  var bd = document.getElementById('bdgs'); bd.innerHTML = '';
  if (dn > 0) bd.innerHTML += '<span class="bdg bdg-red">要注意 '+dn+'件</span>';
  if (wn > 0) bd.innerHTML += '<span class="bdg bdg-orange">まもなく期限 '+wn+'件</span>';

  var ct = document.getElementById('ct'); ct.innerHTML = '';
  D.cats.forEach(function(cat) {
    var sec = document.createElement('div'); sec.className = 'sec';
    var hdr = document.createElement('div'); hdr.className = 'sec-hdr';
    var nb = document.createElement('button'); nb.className = 'tbtn'; nb.textContent = '＋ 項目追加';
    (function(cid){ nb.onclick = function(){ shAddItem(cid); }; })(cat.id);
    var eb = document.createElement('button'); eb.className = 'tbtn tbtn-gray'; eb.textContent = '編集';
    (function(cid){ eb.onclick = function(){ shEditCat(cid); }; })(cat.id);
    var nm = document.createElement('span'); nm.className = 'sec-name'; nm.textContent = cat.name;
    var sb = document.createElement('div'); sb.className = 'sec-btns';
    sb.appendChild(nb); sb.appendChild(eb);
    hdr.appendChild(nm); hdr.appendChild(sb);
    sec.appendChild(hdr);

    if (!cat.items.length) {
      var ni = document.createElement('div'); ni.className = 'noitem'; ni.textContent = '項目がありません';
      sec.appendChild(ni);
    }
    cat.items.forEach(function(it) {
      var d = el(it); var c = cc(it); var a = am(it);
      var ld2 = it.h.length ? it.h[it.h.length-1] : null;
      var card = document.createElement('div'); card.className = 'card ' + c;
      var bar = document.createElement('div'); bar.className = 'bar';
      var content = document.createElement('div'); content.className = 'cc';
      var nm2 = document.createElement('div'); nm2.className = 'cname'; nm2.textContent = it.name;
      var dy = document.createElement('div'); dy.className = 'cdays'; dy.textContent = d !== null ? d+'日' : '未記録';
      var ls = document.createElement('div'); ls.className = 'clast'; ls.textContent = ld2 ? '最終: '+fmt(ld2) : '記録なし';
      content.appendChild(nm2); content.appendChild(dy); content.appendChild(ls);
      if (a) {
        var at = document.createElement('span'); at.className = 'calert';
        var ov = a.indexOf('過ぎ') >= 0;
        at.style.background = ov ? '#ffe5e5' : '#fff3e0';
        at.style.color = ov ? '#c0392b' : '#a05f00';
        at.textContent = a;
        content.appendChild(at);
      }
      card.appendChild(bar); card.appendChild(content);
      (function(ci,ii){ card.onclick = function(){ shItem(ci,ii); }; })(cat.id, it.id);
      sec.appendChild(card);
    });
    ct.appendChild(sec);
  });
}

function showOvl(html) {
  var root = document.getElementById('mroot');
  var bg = document.createElement('div'); bg.className = 'ovl';
  var sh = document.createElement('div'); sh.className = 'sheet';
  var dl = document.createElement('div'); dl.className = 'shdl';
  sh.appendChild(dl); sh.innerHTML += html;
  bg.appendChild(sh);
  bg.onclick = function(e){ if (e.target === bg) closeOvl(); };
  root.appendChild(bg);
}

function closeOvl() { var r = document.getElementById('mroot'); if (r.lastChild) r.removeChild(r.lastChild); }

function shItem(cid, iid) {
  var it = fi(cid, iid); var d = el(it); var c = cc(it);
  var cm = {g:'#1a7a2e', y:'#a05f00', r:'#9b1c16', n:'#8e8e93'};
  var ld2 = it.h.length ? it.h[it.h.length-1] : null;
  var nv = it.nd !== null ? it.nd : '';
  var hh = '';
  if (it.h.length) {
    var rv = it.h.slice().reverse();
    hh = '<div class="htitle">履歴</div>';
    rv.forEach(function(dt,i){ var pv=rv[i+1]; var iv=pv?dif(pv,dt)+'日間隔':'（初回）'; hh+='<div class="hitem"><span>'+fmt(dt)+'</span><span class="hint">'+iv+'</span></div>'; });
  }
  var root = document.getElementById('mroot');
  var bg = document.createElement('div'); bg.className = 'ovl';
  var sh = document.createElement('div'); sh.className = 'sheet';
  sh.innerHTML =
    '<div class="shdl"></div>'+
    '<div class="shtop"><div class="shtitle">'+it.name+'</div>'+
    '<div class="shdays" style="color:'+cm[c]+'">'+(d!==null?d+'日':'未記録')+'</div>'+
    '<div class="shlast">'+(ld2?'最終: '+fmt(ld2):'記録なし')+'</div></div>'+
    '<div class="shsec">'+
    '<button class="bp" id="s-tod">今日実施した</button>'+
    '<button class="bs" id="s-dp">日付を指定して記録</button></div>'+
    '<div class="shsec">'+
    '<label class="flabel">次回通知（何日後に警告するか）</label>'+
    '<div class="rowinput">'+
    '<input class="finput" type="number" inputmode="numeric" id="s-nv" placeholder="未設定" min="1" value="'+nv+'"/>'+
    '<span style="font-size:14px;color:#8e8e93;padding:0 4px;">日</span>'+
    '<button class="bs" id="s-ns" style="width:auto;padding:10px 16px;margin:0;">保存</button>'+
    '</div><div class="fnote">空欄にすると通知なし</div></div>'+
    (hh ? '<div class="shsec">'+hh+'</div>' : '')+
    '<div class="shsec"><button class="bd" id="s-di">この項目を削除</button></div>'+
    '<div class="shsec"><button class="bs" id="s-cl">閉じる</button></div>';
  bg.appendChild(sh);
  bg.onclick = function(e){ if (e.target===bg) closeOvl(); };
  root.appendChild(bg);

  sh.querySelector('#s-tod').onclick = function(){
    var t = td(); if (it.h.indexOf(t) < 0){ it.h.push(t); it.h.sort(); }
    sv(); closeOvl(); shItem(cid,iid); render();
  };
  sh.querySelector('#s-dp').onclick = function(){ closeOvl(); shDatePick(cid,iid); };
  sh.querySelector('#s-ns').onclick = function(){
    var v = sh.querySelector('#s-nv').value;
    it.nd = v==='' ? null : parseInt(v);
    sv(); closeOvl(); shItem(cid,iid); render();
  };
  sh.querySelector('#s-di').onclick = function(){
    if (!confirm('この項目を削除しますか？')) return;
    fc(cid).items = fc(cid).items.filter(function(i){ return i.id!==iid; });
    sv(); closeOvl(); render();
  };
  sh.querySelector('#s-cl').onclick = closeOvl;
}

function shDatePick(cid, iid) {
  var root = document.getElementById('mroot');
  var bg = document.createElement('div'); bg.className = 'ovl';
  var sh = document.createElement('div'); sh.className = 'sheet';
  sh.innerHTML =
    '<div class="shdl"></div>'+
    '<div class="shtop"><div class="shtitle">日付を選択</div></div>'+
    '<div class="shsec"><label class="flabel">実施した日付</label>'+
    '<input class="finput" type="date" id="s-dpv" value="'+td()+'" max="'+td()+'"/></div>'+
    '<div class="shsec"><button class="bp" id="s-dok">記録する</button>'+
    '<button class="bs" id="s-dbk">戻る</button></div>';
  bg.appendChild(sh);
  bg.onclick = function(e){ if (e.target===bg) closeOvl(); };
  root.appendChild(bg);
  sh.querySelector('#s-dok').onclick = function(){
    var v = sh.querySelector('#s-dpv').value; if (!v) return;
    var it = fi(cid,iid);
    if (it.h.indexOf(v) < 0){ it.h.push(v); it.h.sort(); }
    sv(); closeOvl(); shItem(cid,iid); render();
  };
  sh.querySelector('#s-dbk').onclick = function(){ closeOvl(); shItem(cid,iid); };
}

function shAddItem(cid) {
  var root = document.getElementById('mroot');
  var bg = document.createElement('div'); bg.className = 'ovl';
  var sh = document.createElement('div'); sh.className = 'sheet';
  sh.innerHTML =
    '<div class="shdl"></div>'+
    '<div class="shtop"><div class="shtitle">項目を追加</div></div>'+
    '<div class="shsec">'+
    '<label class="flabel">項目名</label><input class="finput" type="text" id="s-ain" placeholder="例：洗顔フォーム"/>'+
    '<label class="flabel" style="margin-top:12px;">通知日数（任意）</label>'+
    '<input class="finput" type="number" inputmode="numeric" id="s-aind" placeholder="未設定" min="1"/>'+
    '<div class="fnote">空欄にすると通知なし</div></div>'+
    '<div class="shsec"><button class="bp" id="s-aok">追加</button>'+
    '<button class="bs" id="s-acl">キャンセル</button></div>';
  bg.appendChild(sh);
  bg.onclick = function(e){ if (e.target===bg) closeOvl(); };
  root.appendChild(bg);
  sh.querySelector('#s-aok').onclick = function(){
    var n = sh.querySelector('#s-ain').value.trim();
    if (!n){ alert('項目名を入力してください'); return; }
    var nv = sh.querySelector('#s-aind').value;
    fc(cid).items.push({id:uid(), name:n, nd:nv===''?null:parseInt(nv), h:[]});
    sv(); closeOvl(); render();
  };
  sh.querySelector('#s-acl').onclick = closeOvl;
}

function shEditCat(cid) {
  var cat = fc(cid);
  var root = document.getElementById('mroot');
  var bg = document.createElement('div'); bg.className = 'ovl';
  var sh = document.createElement('div'); sh.className = 'sheet';
  sh.innerHTML =
    '<div class="shdl"></div>'+
    '<div class="shtop"><div class="shtitle">カテゴリを編集</div></div>'+
    '<div class="shsec"><label class="flabel">カテゴリ名</label>'+
    '<input class="finput" type="text" id="s-ecn" value="'+cat.name+'"/></div>'+
    '<div class="shsec"><button class="bp" id="s-esv">保存</button>'+
    '<button class="bd" id="s-edl" style="margin-top:8px;">このカテゴリを削除</button>'+
    '<button class="bs" id="s-ecl" style="margin-top:8px;">キャンセル</button></div>';
  bg.appendChild(sh);
  bg.onclick = function(e){ if (e.target===bg) closeOvl(); };
  root.appendChild(bg);
  sh.querySelector('#s-esv').onclick = function(){
    var n = sh.querySelector('#s-ecn').value.trim(); if (!n) return;
    cat.name = n; sv(); closeOvl(); render();
  };
  sh.querySelector('#s-edl').onclick = function(){
    if (!confirm('このカテゴリと全項目を削除しますか？')) return;
    D.cats = D.cats.filter(function(c){ return c.id!==cid; });
    sv(); closeOvl(); render();
  };
  sh.querySelector('#s-ecl').onclick = closeOvl;
}

function shAddCat() {
  var root = document.getElementById('mroot');
  var bg = document.createElement('div'); bg.className = 'ovl';
  var sh = document.createElement('div'); sh.className = 'sheet';
  sh.innerHTML =
    '<div class="shdl"></div>'+
    '<div class="shtop"><div class="shtitle">カテゴリを追加</div></div>'+
    '<div class="shsec"><label class="flabel">カテゴリ名</label>'+
    '<input class="finput" type="text" id="s-acn" placeholder="例：掃除"/></div>'+
    '<div class="shsec"><button class="bp" id="s-caok">追加</button>'+
    '<button class="bs" id="s-cacl">キャンセル</button></div>';
  bg.appendChild(sh);
  bg.onclick = function(e){ if (e.target===bg) closeOvl(); };
  root.appendChild(bg);
  sh.querySelector('#s-caok').onclick = function(){
    var n = sh.querySelector('#s-acn').value.trim();
    if (!n){ alert('カテゴリ名を入力してください'); return; }
    D.cats.push({id:uid(), name:n, items:[]});
    sv(); closeOvl(); render();
  };
  sh.querySelector('#s-cacl').onclick = closeOvl;
}

document.getElementById('fadd').onclick = shAddCat;
render();
</script>
</body>
</html>
